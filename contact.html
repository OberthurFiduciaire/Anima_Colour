<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Oberthur Fiduciaire</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="index.css" />

<body class="contact-body">
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand brand-logo" aria-label="Oberthur Fiduciaire home">
        <img src="Logo_oberthur.png" alt="Oberthur Fiduciaire" class="brand-logo-img" />
      </a>
      <nav class="main-nav" aria-label="Main navigation">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="demo.html">Demo</a></li>
          <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="contact-page">
      <div class="hero-bg-grid"></div>
      <div class="hero-orb orb-1"></div>
      <div class="hero-orb orb-2"></div>

      <div class="container contact-shell">
        <div class="contact-hero-card">
          <span class="contact-tag">Contact</span>
          <h1>Let’s talk<br><em>Anima Colour</em></h1>
          <p>Reach Oberthur Fiduciaire for more information about the Anima Colour security demo.</p>
        </div>

        <div class="contact-actions">
          <a class="contact-action email-action" href="mailto:contact@oberthur-fiduciaire.com">
            <span class="contact-icon">@</span>
            <span class="contact-content">
              <small>Email</small>
              <strong>contact@oberthur-fiduciaire.com</strong>
            </span>
            <span class="contact-arrow">→</span>
          </a>

          <a class="contact-action linkedin-action" href="https://www.linkedin.com/search/results/all/?keywords=oberthur%20fiduciaire%20sas&origin=RICH_QUERY_SUGGESTION&spellCorrectionEnabled=false&heroEntityKey=urn%3Ali%3Aorganization%3A5866548&position=0" target="_blank" rel="noopener">
            <span class="contact-icon">in</span>
            <span class="contact-content">
              <small>LinkedIn</small>
              <strong>Oberthur Fiduciaire SAS</strong>
            </span>
            <span class="contact-arrow">→</span>
          </a>
        </div>
      </div>
    </section>
